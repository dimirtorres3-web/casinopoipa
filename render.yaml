databases:
  - name: casinopoipadb
    plan: free

services:
  - type: web
    name: casinopoipa-web
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    startCommand: "gunicorn casinopoipa.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: casinopoipadb
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
