services:
  - type: web
    name: casinopoipa-web
    env: python
    region: oregon
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn casinopoipa.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "casinopoipa.com.py,*.onrender.com,localhost,127.0.0.1"
      - key: CASINOPOIPA_SECRET_KEY
        generate: secret
      - key: CASINOPOIPA_FERNET_KEY
        generate: secret
      - key: CASINOPOIPA_JWT_SECRET
        generate: secret
databases:
  - name: casinopoipa-db
    provider: postgresql
    plan: starter
    region: oregon
    currentService: casinopoipa-web
    envVars:
      - key: DATABASE_URL
        fromDatabase: true
