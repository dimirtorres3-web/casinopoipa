databases:
  - name: casinopoipadb
    plan: free

services:
  - type: web
    name: casinopoipa-web
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    startCommand: "gunicorn casinopoipa.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: casinopoipadb
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: CASINOPOIPA_SECRET_KEY
        generateValue: true
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: DEFAULT_FROM_EMAIL
        value: "no-reply@casinopoipa.com"
      - key: DJANGO_SETTINGS_MODULE
        value: "casinopoipa.settings"
