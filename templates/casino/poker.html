{% extends "base.html" %}
{% load humanize %}
{% block title %}Póker | Casinopoipa{% endblock %}
{% block content %}
    <div class="game-page">
        <div class="layout-shell">
            <header class="topbar fixed-game-header">
                <div class="brand-hero">
                    <span class="brand-mark">🂡</span>
                    <div>
                        <p>Póker</p>
                        <h1>Mesa de Fieltro</h1>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="balance-display glass-panel">
                        <p>Saldo disponible</p>
                        <h2 id="balance-value">Gs. {{ player.saldo|intcomma }}</h2>
                    </div>
                    <a href="{% url 'casino:dashboard' %}" class="btn-secondary">Volver al Menú Principal</a>
                </div>
            </header>
            <main class="game-shell glass-panel poker-shell">
                <section class="table-board">
                    <div class="table-canvas-shell">
                        <canvas id="table-canvas" class="table-canvas"></canvas>
                        <div class="table-overlay">Barajando mazo...</div>
                    </div>
                    <div class="cards-board">
                        <div class="card-zone dealer-zone">
                            <span class="zone-label">Croupier</span>
                            <div class="dealer-cards" id="dealer-cards"></div>
                        </div>
                        <div class="card-zone player-zone">
                            <span class="zone-label">Tu mano</span>
                            <div class="player-cards" id="player-cards"></div>
                        </div>
                    </div>
                </section>
                <section class="game-controls">
                    <div class="game-status" id="game-status">Apuesta mínima 2.000 Gs.</div>
                    <div class="game-actions">
                        <input id="poker-apuesta" type="number" min="2000" value="2000" class="form-input" />
                        <button type="button" id="poker-bet-button" class="btn-primary">Apostar</button>
                    </div>
                </section>
            </main>
        </div>
    </div>
{% endblock %}
